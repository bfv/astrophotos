components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          description: Always 'ok' when the server is running.
          examples:
            - ok
          type: string
      required:
        - status
      type: object
    User:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/User.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: date-time
          type: string
        email:
          type:
            - string
            - "null"
        id:
          type: string
        issuer:
          type: string
        sub:
          type: string
        updated_at:
          format: date-time
          type: string
        username:
          type:
            - string
            - "null"
      required:
        - id
        - issuer
        - sub
        - username
        - email
        - created_at
        - updated_at
      type: object
    UserSettings:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/UserSettings.json
          format: uri
          readOnly: true
          type: string
        astrobin_api_key:
          type:
            - string
            - "null"
        astrometry_api_key:
          type:
            - string
            - "null"
        created_at:
          format: date-time
          type: string
        language:
          type:
            - string
            - "null"
        lat:
          format: double
          type:
            - number
            - "null"
        lon:
          format: double
          type:
            - number
            - "null"
        timezone:
          type:
            - string
            - "null"
        updated_at:
          format: date-time
          type: string
      required:
        - language
        - lat
        - lon
        - timezone
        - astrobin_api_key
        - astrometry_api_key
        - created_at
        - updated_at
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  description: REST API backend for the Astrophotos star-chart frontend.
  title: Astrophotos API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/health:
    get:
      operationId: get-health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security: []
      summary: Liveness check
      tags:
        - system
  /api/settings:
    get:
      operationId: get-settings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get current user settings
      tags:
        - settings
    put:
      operationId: update-settings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettings"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Update current user settings
      tags:
        - settings
  /api/user:
    delete:
      description: Deletes the authenticated user and all associated data.
      operationId: delete-current-user
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Delete current user
      tags:
        - user
    get:
      description: Returns the internal user record for the authenticated user.
      operationId: get-user
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get current user
      tags:
        - user
  /api/user/{id}:
    delete:
      description: Deletes a user by their internal ID and all associated data.
      operationId: delete-user-by-id
      parameters:
        - description: User ID to delete
          in: path
          name: id
          required: true
          schema:
            description: User ID to delete
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Delete user by ID
      tags:
        - user
